name: Frontend CI

on:
  pull_request:
    paths:
      - "stellar-wallet-connect/**"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "stellar-wallet-connect/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-wallet-connect

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            pnpm run lint
          else
            echo "No lint script configured in stellar-wallet-connect; skipping."
          fi

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

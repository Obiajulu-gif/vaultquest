name: Frontend CI

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "components.json"
      - "Provider.jsx"
      - "AvaxConnectButton.jsx"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "components.json"
      - "Provider.jsx"
      - "AvaxConnectButton.jsx"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || 'ci-build-placeholder' }}
        run: npm run build

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Deploy to Vercel (Preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

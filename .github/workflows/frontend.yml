name: Frontend CI

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "components.json"
      - "Provider.jsx"
      - "AvaxConnectButton.jsx"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "components.json"
      - "Provider.jsx"
      - "AvaxConnectButton.jsx"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
